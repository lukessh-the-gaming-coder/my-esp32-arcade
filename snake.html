<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* Neon Arcade Styling to match Space Game */
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { background: #000; color: #0ff; text-align: center; font-family: 'Courier New', monospace; margin: 0; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
    
    .main-wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 20px; padding: 10px; height: calc(100% - 160px); }
    canvas { background: #000; border: 2px solid #0ff; width: 300px; height: 300px; box-shadow: 0 0 15px #0ff; }
    
    #sidebar { background: #000; border: 1px solid #0ff; padding: 10px; width: 220px; text-align: left; font-size: 13px; max-height: 300px; overflow-y: auto; }
    #sidebar h3 { margin: 0 0 5px 0; color: #f0f; font-size: 14px; border-bottom: 1px solid #0ff; text-align: center; }
    .entry { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; font-family: monospace; }
    .entry span:first-child { color: #0ff; }
    .entry span:last-child { color: #f0f; font-weight: bold; }

    @media (max-width: 800px) {
      .main-wrapper { flex-direction: column; align-items: center; }
      canvas { width: 280px; height: 280px; }
      #sidebar { width: 280px; }
    }

    /* Navigation Controls */
    .controls-wrapper { position: fixed; bottom: 0; left: 0; right: 0; height: 150px; background: #000; border-top: 1px solid #333; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 220px; }
    button.ctrl { padding: 15px; font-size: 20px; background: #111; color: #0ff; border: 2px solid #0ff; border-radius: 12px; cursor: pointer; }
    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    #overlay { display: none; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 4px solid #f0f; padding: 20px; width: 280px; z-index: 101; }
  </style>
</head>
<body>

  <h3 style="margin: 10px; color:#f0f; letter-spacing: 2px;">SNAKE ARCADE</h3>

  <div class="main-wrapper">
    <div>
      <div style="font-size: 18px; margin-bottom: 5px;">SCORE: <span id="score">0</span></div>
      <canvas id="snakeCanvas" width="300" height="300"></canvas>
    </div>
    <div id="sidebar">
      <h3>TOP ACE PILOTS</h3>
      <div id="board-content">Scanning database...</div>
    </div>
  </div>

  <div id="overlay">
    <h1 style="color:#f0f; margin:0;">GAME OVER</h1>
    <p id="finalScore" style="color:white; margin:10px;"></p>
    <button style="background:#0ff; color:#000; padding:10px; width:100%; border:none; font-weight:bold; cursor:pointer;" onclick="location.reload()">REBOOT</button>
  </div>

  <div class="controls-wrapper">
    <div class="controls">
      <button class="ctrl up" onclick="changeDir('UP')">▲</button>
      <button class="ctrl left" onclick="changeDir('LEFT')">◀</button>
      <button class="ctrl down" onclick="changeDir('DOWN')">▼</button>
      <button class="ctrl right" onclick="changeDir('RIGHT')">▶</button>
    </div>
  </div>

  <script>
    // FORM CONFIG
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLScAQLxjHfiUsUOiF5p_9M50kVbJm3wFkdOtnzYnm5B7UeIK3g/formResponse";
    const nameID = "entry.438071494"; 
    const scoreID = "entry.1662600885"; 

    // CSV URL generated from your Spreadsheet link
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTf9zI6IeS2R9yD6O_2aD9x9j4W-f5D4p_m8S_q1X2G3B4C5D6E7F8G9H0I1J2K3L4M5N6O7P8Q9R/pub?gid=1074497497&single=true&output=csv";

    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const box = 20;
    
    let snake = [{x: 10 * box, y: 10 * box}];
    let food = { x: Math.floor(Math.random() * 14 + 1) * box, y: Math.floor(Math.random() * 14 + 1) * box };
    let score = 0;
    let d = "RIGHT";
    let isGameOver = false;

    // Start leaderboard refresh
    fetchLeaderboard();

    // Keyboard support
    window.addEventListener('keydown', (e) => {
      if(e.key === "ArrowUp" && d !== "DOWN") d = "UP";
      else if(e.key === "ArrowDown" && d !== "UP") d = "DOWN";
      else if(e.key === "ArrowLeft" && d !== "RIGHT") d = "LEFT";
      else if(e.key === "ArrowRight" && d !== "LEFT") d = "RIGHT";
    });

    function changeDir(newDir) {
      if(newDir === "UP" && d !== "DOWN") d = "UP";
      if(newDir === "DOWN" && d !== "UP") d = "DOWN";
      if(newDir === "LEFT" && d !== "RIGHT") d = "LEFT";
      if(newDir === "RIGHT" && d !== "LEFT") d = "RIGHT";
    }

    function draw() {
      if(isGameOver) return;
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for(let i = 0; i < snake.length; i++) {
        ctx.fillStyle = (i === 0) ? "#0ff" : "#008888";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
        ctx.strokeRect(snake[i].x, snake[i].y, box, box);
      }

      ctx.fillStyle = "#f00";
      ctx.fillRect(food.x, food.y, box, box);

      let snakeX = snake[0].x;
      let snakeY = snake[0].y;

      if( d == "LEFT") snakeX -= box;
      if( d == "UP") snakeY -= box;
      if( d == "RIGHT") snakeX += box;
      if( d == "DOWN") snakeY += box;

      if(snakeX === food.x && snakeY === food.y) {
        score++;
        document.getElementById("score").innerText = score;
        food = { x: Math.floor(Math.random() * 14 + 1) * box, y: Math.floor(Math.random() * 14 + 1) * box };
      } else {
        snake.pop();
      }

      let newHead = { x: snakeX, y: snakeY };

      if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
        endGame();
      }
      snake.unshift(newHead);
    }

    function collision(head, array) {
      for(let i = 0; i < array.length; i++) {
        if(head.x === array[i].x && head.y === array[i].y) return true;
      }
      return false;
    }

    function endGame() {
      if(isGameOver) return;
      isGameOver = true;
      document.getElementById("finalScore").innerText = "FINAL SCORE: " + score;
      document.getElementById("overlay").style.display = "block";
      
      setTimeout(() => {
        let lastUsedName = localStorage.getItem("arcade_name") || "Pilot";
        let n = prompt("SNAKE CRASHED! Save your score:", lastUsedName);
        if(n) {
          localStorage.setItem("arcade_name", n);
          const formData = new URLSearchParams();
          formData.append(nameID, n);
          formData.append(scoreID, score);

          fetch(formURL, { method: 'POST', mode: 'no-cors', body: formData })
          .then(() => {
            console.log("Score Sent!");
            setTimeout(fetchLeaderboard, 1500); // Wait for sheet to update
          });
        }
      }, 500);
    }

    async function fetchLeaderboard() {
      try {
        const response = await fetch(CSV_URL + "&cache=" + Date.now());
        const data = await response.text();
        const rows = data.split("\n").slice(1);
        
        let bestScores = {};

        rows.forEach(row => {
          const cols = row.split(",");
          if(cols.length >= 3) {
            const name = cols[1].replace(/['"]+/g, '').trim();
            const val = parseInt(cols[2]);
            if(!isNaN(val)) {
              if(!bestScores[name] || val > bestScores[name]) {
                bestScores[name] = val;
              }
            }
          }
        });

        const sorted = Object.keys(bestScores)
          .map(name => ({ name, score: bestScores[name] }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 10);

        if(sorted.length === 0) {
            document.getElementById("board-content").innerHTML = "No scores recorded yet.";
            return;
        }

        document.getElementById("board-content").innerHTML = sorted.map((p, i) => `
          <div class="entry">
            <span>${i + 1}. ${p.name}</span>
            <span>${p.score}</span>
          </div>
        `).join("");
      } catch (e) {
        document.getElementById("board-content").innerHTML = "Leaderboard offline.";
        console.error(e);
      }
    }

    let game = setInterval(draw, 120);
  </script>
</body>
</html>
