<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Cloud Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    
    body { 
      background: #111; color: #0f0; text-align: center; 
      font-family: 'Courier New', monospace; margin: 0; 
      height: 100vh; width: 100vw; overflow: hidden;
    }

    /* DESKTOP/LAPTOP LAYOUT */
    .main-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      padding: 20px;
      height: calc(100% - 160px); /* Leave room for controls at bottom */
      overflow-y: auto;
    }

    canvas { background: #000; border: 3px solid #0f0; width: 400px; height: 400px; box-shadow: 0 0 15px #0f0; }

    #sidebar { 
      background: #000; border: 2px solid #0f0; padding: 10px; 
      width: 200px; text-align: left; font-size: 14px;
    }
    #sidebar h3 { margin: 0 0 10px 0; color: #f00; font-size: 16px; border-bottom: 1px solid #0f0; text-align: center; }
    .entry { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }

    /* MOBILE LAYOUT (Screens smaller than 800px) */
    @media (max-width: 800px) {
      .main-wrapper { flex-direction: column; align-items: center; gap: 10px; padding: 5px; }
      canvas { width: 280px; height: 280px; }
      #sidebar { width: 280px; font-size: 12px; }
    }

    /* CONTROLS - Pinned to bottom for both */
    .controls-wrapper { 
      position: fixed; bottom: 0; left: 0; right: 0; 
      height: 150px; background: #111; border-top: 1px solid #333; z-index: 100;
      display: flex; align-items: center;
    }
    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 220px; margin: 0 auto; }
    button.ctrl { padding: 15px; font-size: 24px; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 10px; cursor: pointer; }
    button.ctrl:active { background: #0f0; color: #000; }

    #overlay { display: none; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 4px solid #0f0; padding: 20px; width: 280px; z-index: 101; }
    button.save { background: #0f0; color: #000; border: none; padding: 12px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div id="game-box">
      <div style="font-size: 20px; margin-bottom: 10px; font-weight: bold;">SCORE: <span id="score">0</span></div>
      <canvas id="game" width="400" height="400"></canvas>
    </div>

    <div id="sidebar">
      <h3>GLOBAL TOP 10</h3>
      <div id="board-content">Loading...</div>
    </div>
  </div>

  <div class="controls-wrapper">
    <div class="controls">
      <div></div><button class="ctrl" onclick="changeDir('up')">▲</button><div></div>
      <button class="ctrl" onclick="changeDir('left')">◀</button>
      <button class="ctrl" onclick="changeDir('down')">▼</button>
      <button class="ctrl" onclick="changeDir('right')">▶</button>
    </div>
  </div>

  <div id="overlay">
    <h1 style="color:red; margin:0;">GAME OVER</h1>
    <p id="finalScoreDisplay" style="color:white; margin:10px; font-size: 18px;"></p>
    <button class="save" onclick="location.reload()">PLAY AGAIN</button>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_jIbLwH5A2hLCWRyCtA8OhWX2_O5VVaE4dBXu5VEMlQphM0LJ_L-vcuHNVTzjYwawp9W5jq0vYmA3/pub?output=csv"; 
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeUexRWPrEYccVHlEfZl0xvcWlUJ1mp6eKwdnTHiJ-vFh-hxA/formResponse";
    const nameID = "entry.1544627247";
    const scoreID = "entry.1856974321";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const box = 20;
    let snake = [{x: 200, y: 200}], food = { x: 100, y: 100 };
    let d = "right", nextD = "right", lastTime = 0, isGameOver = false;

    fetchLeaderboard();

    document.addEventListener("keydown", e => {
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault(); 
      if(e.key === "ArrowLeft" && d !== "right") nextD = "left";
      if(e.key === "ArrowUp" && d !== "down") nextD = "up";
      if(e.key === "ArrowRight" && d !== "left") nextD = "right";
      if(e.key === "ArrowDown" && d !== "up") nextD = "down";
    });

    function changeDir(dir) { 
        if(dir=='left' && d!='right') nextD='left';
        if(dir=='up' && d!='down') nextD='up';
        if(dir=='right' && d!='left') nextD='right';
        if(dir=='down' && d!='up') nextD='down';
        document.activeElement.blur();
    }

    async function fetchLeaderboard() {
        try {
            const res = await fetch(CSV_URL + "&cache=" + Date.now());
            const text = await res.text();
            const rows = text.split("\n").slice(1);
            let bestScores = {}; 
            rows.forEach(r => {
                const c = r.split(",");
                if (c.length >= 3) {
                    let name = c[1].replace(/['"]+/g, '').trim();
                    let score = parseInt(c[2]);
                    if (!isNaN(score)) {
                        if (!bestScores[name] || score > bestScores[name]) bestScores[name] = score;
                    }
                }
            });
            let sortedArray = Object.keys(bestScores).map(n => ({ n, s: bestScores[n] }));
            sortedArray.sort((a,b) => b.s - a.s);
            let top10 = sortedArray.slice(0, 10);
            let html = "";
            top10.forEach((item, i) => {
                html += `<div class='entry'><span>${i+1}.${item.n}</span><span>${item.s}</span></div>`;
            });
            document.getElementById("board-content").innerHTML = html || "No scores yet";
        } catch(e) { document.getElementById("board-content").innerHTML = "Error..."; }
    }

    function handleGameOver() {
        isGameOver = true;
        let finalScore = snake.length - 1;
        document.getElementById("finalScoreDisplay").innerText = "SCORE: " + finalScore;
        document.getElementById("overlay").style.display = "block";
        setTimeout(() => {
            let playerName = prompt("🏆 NEW HIGH SCORE?\nEnter name:", "Player");
            if (playerName) {
                const fd = new FormData();
                fd.append(nameID, playerName);
                fd.append(scoreID, finalScore);
                fetch(formURL, { method: 'POST', mode: 'no-cors', body: fd }).then(() => fetchLeaderboard());
            }
        }, 300);
    }

    function update() {
        if (isGameOver) return;
        d = nextD;
        let hX = snake[0].x, hY = snake[0].y;
        if(d=='left') hX-=box; if(d=='up') hY-=box; if(d=='right') hX+=box; if(d=='down') hY+=box;
        if (hX < 0) hX = 380; else if (hX >= 400) hX = 0;
        if (hY < 0) hY = 380; else if (hY >= 400) hY = 0;
        for(let i=0; i<snake.length; i++) {
            if(hX==snake[i].x && hY==snake[i].y) { handleGameOver(); return; }
        }
        if(hX==food.x && hY==food.y) {
            food = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            document.getElementById("score").innerText = snake.length;
        } else snake.pop();
        snake.unshift({x:hX, y:hY});
    }

    function draw() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
        snake.forEach((p, i) => { ctx.fillStyle = i==0?"#0f0":"#050"; ctx.fillRect(p.x, p.y, box-1, box-1); });
        ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box-1, box-1);
    }

    function main(t) {
        if (!isGameOver) {
            window.requestAnimationFrame(main);
            if (t - lastTime < 150) return;
            lastTime = t; update(); draw();
        }
    }
    window.requestAnimationFrame(main);
  </script>
</body>
</html>
