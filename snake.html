<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Cloud Arcade - Snake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #111; color: #0f0; text-align: center; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
    canvas { background: #000; display: block; margin: 5px auto; border: 3px solid #0f0; max-width: 85vw; box-shadow: 0 0 15px #0f0; }
    
    /* OVERLAY STYLING */
    #overlay {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95);
      border: 4px solid #0f0; padding: 20px; width: 80vw; max-width: 300px;
      z-index: 10; box-shadow: 0 0 50px #0f0;
    }
    #overlay h1 { color: #f00; margin: 5px; font-size: 24px; text-shadow: 2px 2px #500; }
    #leaderboard { text-align: left; margin: 15px 0; font-size: 16px; color: #fff; line-height: 1.6; }
    .entry { display: flex; justify-content: space-between; border-bottom: 1px dotted #0f0; padding: 2px 0; }
    .entry span:first-child { color: #0f0; }

    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 250px; margin: 10px auto; }
    button.ctrl { padding: 20px; font-size: 25px; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 12px; }
    button.ctrl:active { background: #0f0; color: #000; }
    button.save { background: #0f0; color: #000; border: none; padding: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; border-radius: 5px; }
  </style>
</head>
<body>

  <div id="score" style="font-size: 22px; margin: 10px; font-weight: bold; text-shadow: 0 0 5px #0f0;">SCORE: 0</div>
  <canvas id="game" width="400" height="400"></canvas>

  <div id="overlay">
    <h1>GAME OVER</h1>
    <div id="leaderboard">Fetching Top 5...</div>
    <button class="save" onclick="saveAndRestart()">SUBMIT & REPLAY</button>
  </div>
  
  <div class="controls">
    <div style="visibility:hidden"></div><button class="ctrl" onclick="changeDir('up')">▲</button><div></div>
    <button class="ctrl" onclick="changeDir('left')">◀</button>
    <button class="ctrl" onclick="changeDir('down')">▼</button>
    <button class="ctrl" onclick="changeDir('right')">▶</button>
  </div>

  <script>
    // --- YOUR CUSTOM CONFIG ---
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_jIbLwH5A2hLCWRyCtA8OhWX2_O5VVaE4dBXu5VEMlQphM0LJ_L-vcuHNVTzjYwawp9W5jq0vYmA3/pub?output=csv"; 
    const formID = "1FAIpQLSeUexRWPrEYccVHlEfZl0xvcWlUJ1mp6eKwdnTHiJ-vFh-hxA";
    const nameID = "entry.1544627247";
    const scoreID = "entry.1856974321";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const box = 20;
    let snake = [{x: 200, y: 200}];
    let food = { x: 100, y: 100 };
    let d = "right", nextD = "right", lastTime = 0, isGameOver = false;

    function changeDir(dir) { 
        if(dir=='left' && d!='right') nextD='left';
        if(dir=='up' && d!='down') nextD='up';
        if(dir=='right' && d!='left') nextD='right';
        if(dir=='down' && d!='up') nextD='down';
    }

    async function fetchLeaderboard() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            // Split rows and handle CSV formatting
            const rows = data.split("\n").slice(1); 
            let scores = rows.map(row => {
                const cols = row.split(",");
                if(cols.length < 3) return null;
                // Clean quotes from Google Sheets names
                let name = cols[1].replace(/['"]+/g, '');
                let score = parseInt(cols[2]);
                return { name, score };
            }).filter(item => item !== null && !isNaN(item.score));

            // Sort Top 5
            scores.sort((a, b) => b.score - a.score);
            let top5 = scores.slice(0, 5);

            let html = "<b>GLOBAL TOP 5:</b><br>";
            if(top5.length === 0) html += "Be the first to score!";
            top5.forEach((s, i) => {
                html += `<div class='entry'><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`;
            });
            document.getElementById("leaderboard").innerHTML = html;
        } catch (e) {
            document.getElementById("leaderboard").innerHTML = "Internet required for scores.";
        }
    }

    function saveAndRestart() {
        let n = prompt("Enter your name:", "Player");
        if (n) {
            const formData = new FormData();
            formData.append(nameID, n);
            formData.append(scoreID, (snake.length - 1));
            fetch(`https://docs.google.com/forms/d/e/${formID}/formResponse`, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => location.reload());
        } else {
            location.reload();
        }
    }

    function update() {
        if (isGameOver) return;
        d = nextD;
        let hX = snake[0].x, hY = snake[0].y;
        if(d=='left') hX-=box; if(d=='up') hY-=box; if(d=='right') hX+=box; if(d=='down') hY+=box;

        if (hX < 0) hX = 380; else if (hX >= 400) hX = 0;
        if (hY < 0) hY = 380; else if (hY >= 400) hY = 0;

        for(let i=0; i<snake.length; i++) {
            if(hX==snake[i].x && hY==snake[i].y) {
                isGameOver = true;
                document.getElementById("overlay").style.display = "block";
                fetchLeaderboard();
                return;
            }
        }

        if(hX==food.x && hY==food.y) {
            food = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            document.getElementById("score").innerText = "SCORE: " + snake.length;
        } else snake.pop();
        snake.unshift({x:hX, y:hY});
    }

    function draw() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
        snake.forEach((p, i) => { 
            ctx.fillStyle = i==0?"#0f0":"#050"; 
            ctx.fillRect(p.x, p.y, box-1, box-1); 
        });
        ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box-1, box-1);
    }

    function main(t) {
        if (!isGameOver) {
            window.requestAnimationFrame(main);
            if (t - lastTime < 150) return;
            lastTime = t; update(); draw();
        }
    }
    window.requestAnimationFrame(main);
  </script>
</body>
</html>
