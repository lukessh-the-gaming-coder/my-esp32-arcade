<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { background: #000; color: #0ff; text-align: center; font-family: 'Courier New', monospace; margin: 0; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
    
    .main-wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 20px; padding: 10px; height: calc(100% - 160px); }
    canvas { background: #000; border: 2px solid #0ff; width: 300px; height: 300px; box-shadow: 0 0 15px #0ff; }
    
    #sidebar { background: #000; border: 1px solid #0ff; padding: 10px; width: 200px; text-align: left; font-size: 13px; }
    #sidebar h3 { margin: 0 0 5px 0; color: #f0f; font-size: 14px; border-bottom: 1px solid #0ff; text-align: center; }

    @media (max-width: 800px) {
      .main-wrapper { flex-direction: column; align-items: center; }
      canvas { width: 280px; height: 280px; }
      #sidebar { width: 280px; }
    }

    .controls-wrapper { position: fixed; bottom: 0; left: 0; right: 0; height: 150px; background: #000; border-top: 1px solid #333; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 220px; }
    button.ctrl { padding: 15px; font-size: 20px; background: #111; color: #0ff; border: 2px solid #0ff; border-radius: 12px; cursor: pointer; }
    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    #overlay { display: none; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 4px solid #f0f; padding: 20px; width: 280px; z-index: 101; }
  </style>
</head>
<body>

  <h3 style="margin: 10px; color:#f0f; letter-spacing: 2px;">SNAKE GAME</h3>

  <div class="main-wrapper">
    <div>
      <div style="font-size: 18px; margin-bottom: 5px;">SCORE: <span id="score">0</span></div>
      <canvas id="snakeCanvas" width="300" height="300"></canvas>
    </div>
    <div id="sidebar">
      <h3>STATS</h3>
      <div id="board-content">Eat to grow. Avoid the walls!</div>
    </div>
  </div>

  <div id="overlay">
    <h1 style="color:#f0f; margin:0;">GAME OVER</h1>
    <p id="finalScore" style="color:white; margin:10px;"></p>
    <button style="background:#0ff; color:#000; padding:10px; width:100%; border:none; font-weight:bold; cursor:pointer;" onclick="location.reload()">REPLAY</button>
  </div>

  <div class="controls-wrapper">
    <div class="controls">
      <button class="ctrl up" onclick="changeDir('UP')">▲</button>
      <button class="ctrl left" onclick="changeDir('LEFT')">◀</button>
      <button class="ctrl down" onclick="changeDir('DOWN')">▼</button>
      <button class="ctrl right" onclick="changeDir('RIGHT')">▶</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const box = 20;
    
    let snake = [{x: 10 * box, y: 10 * box}];
    let food = { x: Math.floor(Math.random() * 14 + 1) * box, y: Math.floor(Math.random() * 14 + 1) * box };
    let score = 0;
    let d = "RIGHT";
    let isGameOver = false;

    // Arrow Key support
    window.addEventListener('keydown', (e) => {
      if(e.key === "ArrowUp" && d !== "DOWN") d = "UP";
      else if(e.key === "ArrowDown" && d !== "UP") d = "DOWN";
      else if(e.key === "ArrowLeft" && d !== "RIGHT") d = "LEFT";
      else if(e.key === "ArrowRight" && d !== "LEFT") d = "RIGHT";
    });

    function changeDir(newDir) {
      if(newDir === "UP" && d !== "DOWN") d = "UP";
      if(newDir === "DOWN" && d !== "UP") d = "DOWN";
      if(newDir === "LEFT" && d !== "RIGHT") d = "LEFT";
      if(newDir === "RIGHT" && d !== "LEFT") d = "RIGHT";
    }

    function draw() {
      if(isGameOver) return;
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for(let i = 0; i < snake.length; i++) {
        ctx.fillStyle = (i === 0) ? "#0ff" : "#008888";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
        ctx.strokeStyle = "black";
        ctx.strokeRect(snake[i].x, snake[i].y, box, box);
      }

      ctx.fillStyle = "#f00";
      ctx.fillRect(food.x, food.y, box, box);

      let snakeX = snake[0].x;
      let snakeY = snake[0].y;

      if( d == "LEFT") snakeX -= box;
      if( d == "UP") snakeY -= box;
      if( d == "RIGHT") snakeX += box;
      if( d == "DOWN") snakeY += box;

      if(snakeX === food.x && snakeY === food.y) {
        score++;
        document.getElementById("score").innerText = score;
        food = { x: Math.floor(Math.random() * 14 + 1) * box, y: Math.floor(Math.random() * 14 + 1) * box };
      } else {
        snake.pop();
      }

      let newHead = { x: snakeX, y: snakeY };

      if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
        endGame();
      }
      snake.unshift(newHead);
    }

    function collision(head, array) {
      for(let i = 0; i < array.length; i++) {
        if(head.x === array[i].x && head.y === array[i].y) return true;
      }
      return false;
    }

    function endGame() {
      isGameOver = true;
      document.getElementById("finalScore").innerText = "FINAL SCORE: " + score;
      document.getElementById("overlay").style.display = "block";
    }

    let game = setInterval(draw, 120);
  </script>
</body>
</html>
