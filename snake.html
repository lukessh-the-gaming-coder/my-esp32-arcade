<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Global Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #111; color: #0f0; text-align: center; font-family: 'Courier New', monospace; margin: 0; }
    
    .game-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
    
    /* SIDE LEADERBOARD */
    #sidebar { 
      background: #000; border: 2px solid #0f0; padding: 10px; 
      width: 180px; text-align: left; font-size: 14px; height: fit-content;
    }
    #sidebar h3 { margin: 0 0 10px 0; color: #f00; font-size: 16px; border-bottom: 1px solid #0f0; }
    .entry { display: flex; justify-content: space-between; margin-bottom: 5px; }

    canvas { background: #000; border: 3px solid #0f0; max-width: 90vw; box-shadow: 0 0 15px #0f0; }
    
    #overlay {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95);
      border: 4px solid #0f0; padding: 20px; width: 250px; z-index: 10;
    }

    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 250px; margin: 10px auto; }
    button.ctrl { padding: 20px; font-size: 25px; background: #222; color: #0f0; border: 2px solid #0f0; border-radius: 12px; }
    button.save { background: #0f0; color: #000; border: none; padding: 12px; font-weight: bold; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

  <h2 style="margin: 10px;">SNAKE ARCADE</h2>

  <div class="game-container">
    <div id="sidebar">
      <h3>GLOBAL TOP 5</h3>
      <div id="board-content">Loading...</div>
    </div>

    <div>
      <div style="font-size: 20px; margin-bottom: 5px;">SCORE: <span id="score">0</span></div>
      <canvas id="game" width="400" height="400"></canvas>
    </div>
  </div>

  <div id="overlay">
    <h1 style="color:red">CRASHED!</h1>
    <button class="save" onclick="saveAndRestart()">SUBMIT SCORE</button>
  </div>
  
  <div class="controls">
    <div style="visibility:hidden"></div><button class="ctrl" onclick="changeDir('up')">▲</button><div></div>
    <button class="ctrl" onclick="changeDir('left')">◀</button>
    <button class="ctrl" onclick="changeDir('down')">▼</button>
    <button class="ctrl" onclick="changeDir('right')">▶</button>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_jIbLwH5A2hLCWRyCtA8OhWX2_O5VVaE4dBXu5VEMlQphM0LJ_L-vcuHNVTzjYwawp9W5jq0vYmA3/pub?output=csv"; 
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeUexRWPrEYccVHlEfZl0xvcWlUJ1mp6eKwdnTHiJ-vFh-hxA/formResponse";
    const nameID = "entry.1544627247";
    const scoreID = "entry.1856974321";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const box = 20;
    let snake = [{x: 200, y: 200}], food = { x: 100, y: 100 };
    let d = "right", nextD = "right", lastTime = 0, isGameOver = false;

    // Load leaderboard immediately on start
    fetchLeaderboard();

    function changeDir(dir) { 
        if(dir=='left' && d!='right') nextD='left';
        if(dir=='up' && d!='down') nextD='up';
        if(dir=='right' && d!='left') nextD='right';
        if(dir=='down' && d!='up') nextD='down';
    }

    async function fetchLeaderboard() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split("\n").slice(1);
            let scores = rows.map(r => {
                const c = r.split(",");
                return { n: c[1].replace(/['"]+/g, ''), s: parseInt(c[2]) };
            }).filter(i => !isNaN(i.s)).sort((a,b) => b.s - a.s).slice(0, 5);

            let html = "";
            scores.forEach((s, i) => {
                html += `<div class='entry'><span>${i+1}.${s.n}</span><span>${s.s}</span></div>`;
            });
            document.getElementById("board-content").innerHTML = html || "No scores yet";
        } catch(e) { document.getElementById("board-content").innerHTML = "Offline"; }
    }

    function saveAndRestart() {
        let n = prompt("Name:");
        if (n) {
            const fd = new FormData();
            fd.append(nameID, n);
            fd.append(scoreID, snake.length - 1);
            fetch(formURL, { method: 'POST', mode: 'no-cors', body: fd }).then(() => location.reload());
        } else location.reload();
    }

    function update() {
        if (isGameOver) return;
        d = nextD;
        let hX = snake[0].x, hY = snake[0].y;
        if(d=='left') hX-=box; if(d=='up') hY-=box; if(d=='right') hX+=box; if(d=='down') hY+=box;

        if (hX < 0) hX = 380; else if (hX >= 400) hX = 0;
        if (hY < 0) hY = 380; else if (hY >= 400) hY = 0;

        for(let i=0; i<snake.length; i++) {
            if(hX==snake[i].x && hY==snake[i].y) {
                isGameOver = true;
                document.getElementById("overlay").style.display = "block";
                return;
            }
        }

        if(hX==food.x && hY==food.y) {
            food = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            document.getElementById("score").innerText = snake.length;
        } else snake.pop();
        snake.unshift({x:hX, y:hY});
    }

    function draw() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
        snake.forEach((p, i) => { ctx.fillStyle = i==0?"#0f0":"#050"; ctx.fillRect(p.x, p.y, box-1, box-1); });
        ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box-1, box-1);
    }

    function main(t) {
        if (!isGameOver) {
            window.requestAnimationFrame(main);
            if (t - lastTime < 150) return;
            lastTime = t; update(); draw();
        }
    }
    window.requestAnimationFrame(main);
  </script>
</body>
</html>
