<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Pro Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* Prevents selecting text and zooming when tapping fast */
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #111; color: #0f0; text-align: center; font-family: 'Courier New', monospace; margin: 0; }
    canvas { background: #000; display: block; margin: 10px auto; border: 3px solid #0f0; max-width: 95vw; }
    
    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 280px; margin: 20px auto; }
    button { 
      padding: 25px; font-size: 30px; background: #222; color: #0f0; 
      border: 2px solid #0f0; border-radius: 15px; cursor: pointer;
    }
    button:active { background: #0f0; color: #000; }
    .empty { visibility: hidden; }
  </style>
</head>
<body>
  <h2 style="margin: 10px;">CLOUDSNAKE</h2>
  <canvas id="game" width="400" height="400"></canvas>
  
  <div class="controls">
    <div class="empty"></div><button onmousedown="changeDir('up')" ontouchstart="changeDir('up')">▲</button><div class="empty"></div>
    <button onmousedown="changeDir('left')" ontouchstart="changeDir('left')">◀</button>
    <button onmousedown="changeDir('down')" ontouchstart="changeDir('down')">▼</button>
    <button onmousedown="changeDir('right')" ontouchstart="changeDir('right')">▶</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const box = 20;
    const canvasSize = 400;

    let snake = [{x: 200, y: 200}];
    let food = { x: 100, y: 100 };
    let d = "right";
    let nextD = "right"; 
    let lastTime = 0;
    const speed = 130; // Change to 150 for even slower, 100 for faster

    // Input Handling
    document.addEventListener("keydown", e => {
      if(e.keyCode == 37 && d != "right") nextD = "left";
      if(e.keyCode == 38 && d != "down") nextD = "up";
      if(e.keyCode == 39 && d != "left") nextD = "right";
      if(e.keyCode == 40 && d != "up") nextD = "down";
    });

    function changeDir(dir) { 
      if(dir == "left" && d != "right") nextD = "left";
      if(dir == "up" && d != "down") nextD = "up";
      if(dir == "right" && d != "left") nextD = "right";
      if(dir == "down" && d != "up") nextD = "down";
    }

    function main(currentTime) {
      window.requestAnimationFrame(main);
      const secondsSinceLastRender = (currentTime - lastTime);
      if (secondsSinceLastRender < speed) return;
      lastTime = currentTime;
      
      update();
      draw();
    }

    function update() {
      d = nextD;
      let headX = snake[0].x;
      let headY = snake[0].y;

      if(d == "left") headX -= box;
      if(d == "up") headY -= box;
      if(d == "right") headX += box;
      if(d == "down") headY += box;

      // Wrapping
      if (headX < 0) headX = canvasSize - box;
      else if (headX >= canvasSize) headX = 0;
      if (headY < 0) headY = canvasSize - box;
      else if (headY >= canvasSize) headY = 0;

      const newHead = {x: headX, y: headY};

      // Check Collision with self
      for(let i=0; i<snake.length; i++) {
        if(newHead.x == snake[i].x && newHead.y == snake[i].y) {
          snake = [{x: 200, y: 200}]; // Reset game
          return;
        }
      }

      if(headX == food.x && headY == food.y) {
        food = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
      } else {
        snake.pop();
      }
      snake.unshift(newHead);
    }

    function draw() {
      ctx.fillStyle = "black";
      ctx.fillRect(0,0,canvasSize,canvasSize);
      
      // Snake Body
      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#0f0" : "#050";
        ctx.strokeStyle = "black";
        ctx.fillRect(part.x, part.y, box, box);
        ctx.strokeRect(part.x, part.y, box, box);
      });

      // Food
      ctx.fillStyle = "red";
      ctx.fillRect(food.x, food.y, box, box);
    }

    window.requestAnimationFrame(main);
  </script>
</body>
</html>
