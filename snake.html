<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Cloud Snake - Chill Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background: #1a1a1a; color: #00FF00; text-align: center; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; }
    canvas { background: #000; display: block; margin: 10px auto; border: 4px solid #333; max-width: 90vw; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 220px; margin: 10px auto; }
    button { padding: 20px; font-size: 24px; background: #333; color: #00FF00; border: 2px solid #00FF00; border-radius: 10px; active { background: #00FF00; color: #000; } }
    h2 { margin-top: 20px; letter-spacing: 3px; }
  </style>
</head>
<body>
  <h2>ARCADE: SNAKE</h2>
  <canvas id="game" width="400" height="400"></canvas>
  
  <div class="controls">
    <div></div><button onclick="changeDir('up')">▲</button><div></div>
    <button onclick="changeDir('left')">◀</button><button onclick="changeDir('down')">▼</button><button onclick="changeDir('right')">▶</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    let box = 20;
    let canvasSize = 400;
    let snake = [{x: 10 * box, y: 10 * box}];
    let food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
    let d = "right";

    document.addEventListener("keydown", e => {
      if(e.keyCode == 37 && d != "right") d = "left";
      if(e.keyCode == 38 && d != "down") d = "up";
      if(e.keyCode == 39 && d != "left") d = "right";
      if(e.keyCode == 40 && d != "up") d = "down";
    });

    function changeDir(dir) { 
      if(dir == "left" && d != "right") d = "left";
      if(dir == "up" && d != "down") d = "up";
      if(dir == "right" && d != "left") d = "right";
      if(dir == "down" && d != "up") d = "down";
    }

    function draw() {
      // Clear screen
      ctx.fillStyle = "black"; ctx.fillRect(0,0,canvasSize,canvasSize);
      
      // Draw Snake
      for(let i=0; i<snake.length; i++) {
        ctx.fillStyle = (i==0) ? "#00FF00" : "#008800";
        ctx.fillRect(snake[i].x, snake[i].y, box-2, box-2);
      }

      // Draw Food
      ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);

      // Move Head
      let headX = snake[0].x; let headY = snake[0].y;
      if(d == "left") headX -= box; if(d == "up") headY -= box;
      if(d == "right") headX += box; if(d == "down") headY += box;

      // --- WALL WRAPPING LOGIC ---
      if (headX < 0) headX = canvasSize - box;
      else if (headX >= canvasSize) headX = 0;
      
      if (headY < 0) headY = canvasSize - box;
      else if (headY >= canvasSize) headY = 0;
      // ---------------------------

      // Check if food eaten
      if(headX == food.x && headY == food.y) {
        food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
      } else { 
        snake.pop(); 
      }

      let newHead = {x: headX, y: headY};

      // Game Over if snake hits itself
      for(let i=0; i<snake.length; i++) {
        if(newHead.x == snake[i].x && newHead.y == snake[i].y) {
            location.reload(); 
        }
      }

      snake.unshift(newHead);
    }

    // SPEED: Changed from 100 to 150 (Higher = Slower)
    setInterval(draw, 150);
  </script>
</body>
</html>
