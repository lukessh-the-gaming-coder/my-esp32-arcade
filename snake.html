<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Cloud Arcade - Snake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #111; color: #0f0; text-align: center; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
    canvas { background: #000; display: block; margin: 10px auto; border: 3px solid #0f0; max-width: 90vw; box-shadow: 0 0 15px #0f0; }
    
    .score-box { font-size: 24px; margin: 10px; color: #0f0; font-weight: bold; }
    
    /* THE SCOREBOARD OVERLAY */
    #overlay {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 4px solid #0f0;
      padding: 30px;
      width: 250px;
      z-index: 10;
      box-shadow: 0 0 50px #0f0;
    }
    #overlay h1 { color: red; margin: 0; font-size: 30px; }
    #overlay p { font-size: 20px; color: #fff; margin: 20px 0; }
    #overlay button {
      background: #0f0; color: #000; border: none; padding: 10px 20px;
      font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px;
    }

    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 280px; margin: 15px auto; }
    button.ctrl { 
      padding: 25px; font-size: 30px; background: #222; color: #0f0; 
      border: 2px solid #0f0; border-radius: 12px; cursor: pointer;
    }
    button.ctrl:active { background: #0f0; color: #000; }
    .empty { visibility: hidden; }
  </style>
</head>
<body>

  <h2 style="margin: 10px; letter-spacing: 5px;">SNAKE ARCADE</h2>
  <div class="score-box" id="scoreDisplay">Score: 0</div>
  
  <canvas id="game" width="400" height="400"></canvas>

  <div id="overlay">
    <h1>GAME OVER</h1>
    <p id="finalScoreText">SCORE: 0</p>
    <button onclick="saveAndRestart()">SAVE & RESTART</button>
  </div>
  
  <div class="controls">
    <div class="empty"></div><button class="ctrl" onmousedown="changeDir('up')" ontouchstart="changeDir('up')">▲</button><div class="empty"></div>
    <button class="ctrl" onmousedown="changeDir('left')" ontouchstart="changeDir('left')">◀</button>
    <button class="ctrl" onmousedown="changeDir('down')" ontouchstart="changeDir('down')">▼</button>
    <button class="ctrl" onmousedown="changeDir('right')" ontouchstart="changeDir('right')">▶</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const box = 20;
    const canvasSize = 400;

    let snake = [{x: 200, y: 200}];
    let food = { x: 100, y: 100 };
    let d = "right";
    let nextD = "right"; 
    let lastTime = 0;
    let isGameOver = false;
    const speed = 150; 

    const formID = "1FAIpQLSeUexRWPrEYccVHlEfZl0xvcWlUJ1mp6eKwdnTHiJ-vFh-hxA";
    const nameID = "entry.1544627247";
    const scoreID = "entry.1856974321";

    document.addEventListener("keydown", e => {
      if(e.keyCode == 37 && d != "right") nextD = "left";
      if(e.keyCode == 38 && d != "down") nextD = "up";
      if(e.keyCode == 39 && d != "left") nextD = "right";
      if(e.keyCode == 40 && d != "up") nextD = "down";
    });

    function changeDir(dir) { 
      if(dir == "left" && d != "right") nextD = "left";
      if(dir == "up" && d != "down") nextD = "up";
      if(dir == "right" && d != "left") nextD = "right";
      if(dir == "down" && d != "up") nextD = "down";
    }

    function saveAndRestart() {
        let score = snake.length - 1;
        let name = prompt("Enter your name for the Cloud Leaderboard:", "Player");
        if (name) {
            const baseURL = `https://docs.google.com/forms/d/e/${formID}/formResponse`;
            const formData = new FormData();
            formData.append(nameID, name);
            formData.append(scoreID, score);
            fetch(baseURL, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => location.reload());
        } else {
            location.reload();
        }
    }

    function main(currentTime) {
      if (isGameOver) return;
      window.requestAnimationFrame(main);
      const secondsSinceLastRender = (currentTime - lastTime);
      if (secondsSinceLastRender < speed) return;
      lastTime = currentTime;
      update();
      draw();
    }

    function update() {
      d = nextD;
      let headX = snake[0].x;
      let headY = snake[0].y;

      if(d == "left") headX -= box;
      if(d == "up") headY -= box;
      if(d == "right") headX += box;
      if(d == "down") headY += box;

      if (headX < 0) headX = canvasSize - box;
      else if (headX >= canvasSize) headX = 0;
      if (headY < 0) headY = canvasSize - box;
      else if (headY >= canvasSize) headY = 0;

      const newHead = {x: headX, y: headY};

      for(let i = 0; i < snake.length; i++) {
        if(newHead.x == snake[i].x && newHead.y == snake[i].y) {
          showScoreboard();
          return;
        }
      }

      if(headX == food.x && headY == food.y) {
        food = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
        document.getElementById("scoreDisplay").innerText = "Score: " + (snake.length);
      } else {
        snake.pop();
      }
      snake.unshift(newHead);
    }

    function showScoreboard() {
        isGameOver = true;
        document.getElementById("finalScoreText").innerText = "FINAL SCORE: " + (snake.length - 1);
        document.getElementById("overlay").style.display = "block";
    }

    function draw() {
      ctx.fillStyle = "black";
      ctx.fillRect(0,0,canvasSize,canvasSize);
      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#0f0" : "#050";
        ctx.fillRect(part.x, part.y, box-1, box-1);
      });
      ctx.fillStyle = "red";
      ctx.fillRect(food.x, food.y, box-1, box-1);
    }

    window.requestAnimationFrame(main);
  </script>
</body>
</html>
