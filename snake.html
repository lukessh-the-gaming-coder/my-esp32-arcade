<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Cloud Snake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background: #222; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
    canvas { background: #000; display: block; margin: 10px auto; border: 2px solid #555; max-width: 90vw; }
    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 200px; margin: 10px auto; }
    button { padding: 15px; font-size: 20px; background: #444; color: white; border: none; border-radius: 5px; }
  </style>
</head>
<body>
  <h2>ESP32 ARCADE: SNAKE</h2>
  <canvas id="game" width="400" height="400"></canvas>
  <p>Use Arrows on Laptop or Buttons on Phone</p>
  <div class="controls">
    <div></div><button onclick="changeDir('up')">▲</button><div></div>
    <button onclick="changeDir('left')">◀</button><button onclick="changeDir('down')">▼</button><button onclick="changeDir('right')">▶</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    let box = 20;
    let snake = [{x: 10 * box, y: 10 * box}];
    let food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
    let d = "right";

    document.addEventListener("keydown", e => {
      if(e.keyCode == 37 && d != "right") d = "left";
      if(e.keyCode == 38 && d != "down") d = "up";
      if(e.keyCode == 39 && d != "left") d = "right";
      if(e.keyCode == 40 && d != "up") d = "down";
    });

    function changeDir(dir) { 
      if(dir == "left" && d != "right") d = "left";
      if(dir == "up" && d != "down") d = "up";
      if(dir == "right" && d != "left") d = "right";
      if(dir == "down" && d != "up") d = "down";
    }

    function draw() {
      ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
      for(let i=0; i<snake.length; i++) {
        ctx.fillStyle = (i==0) ? "green" : "lime";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
      }
      ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);
      let headX = snake[0].x; let headY = snake[0].y;
      if(d == "left") headX -= box; if(d == "up") headY -= box;
      if(d == "right") headX += box; if(d == "down") headY += box;
      if(headX == food.x && headY == food.y) {
        food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
      } else { snake.pop(); }
      let newHead = {x: headX, y: headY};
      if(headX<0 || headX>=400 || headY<0 || headY>=400) location.reload();
      snake.unshift(newHead);
    }
    setInterval(draw, 100);
  </script>
</body>
</html>
